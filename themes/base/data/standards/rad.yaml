# RAD descriptive standard profile
#
# RAD (Rules for Archival Description) is the Canadian archival description
# standard. This file is the RAD profile: the field labels, level labels
# (fonds, series, file, item), section headers, and the ordered list of
# fields with their visibility flags. Templates read it at build time to
# render archival records under the RAD standard.
#
# This profile is a placeholder. Both the English and Spanish blocks copy
# the ISAD(G) label set and mark every label `[STUB]`. RAD uses distinct
# terminology for some elements, including Canadian French variants, so a
# qualified archivist must replace these with verified RAD terminology
# before they are used in production.
#
# The profile structure mirrors isadg.yaml — the same top-level schema and
# the same field keys in the same order — so a single template loop renders
# any standard without modification.
#
# To override for a deployment, copy this entire file to
# instance/themes/{name}/data/standards/rad.yaml and edit it. Hugo replaces
# whole top-level keys across the theme chain, so a partial override would
# silently drop the sibling language block — always ship the full file.

# English RAD profile — placeholder. ISAD(G) English labels stand in until
