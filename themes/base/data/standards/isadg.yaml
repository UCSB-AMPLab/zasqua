    description:   "Descripción"
    bibliographic: "Información bibliográfica"
    access:        "Condiciones de acceso"
    related:       "Materiales relacionados"
    notes:         "Notas"
    control:       "Control"
    reuse:         "Reutilización"
  levels:
    fonds:      "Fondo"
    subfonds:   "Subfondo"
    series:     "Serie"
    subseries:  "Subserie"
    file:       "Expediente"
    item:       "Unidad documental"
    collection: "Colección"
    section:    "Sección"
    volume:     "Tomo"
  levelsPlural:
    fonds:      "fondos"
    subfonds:   "subfondos"
    series:     "series"
    subseries:  "subseries"
    file:       "expedientes"
    item:       "documentos"
    collection: "colecciones"
    section:    "secciones"
    volume:     "tomos"
    caja:       "cajas"
    carpeta:    "carpetas"
