# ISAD(G) descriptive standard profile
#
# ISAD(G) (General International Standard Archival Description) is the
# international archival description standard and the engine's default. This
# file is the ISAD(G) profile: the field labels, level labels (fonds,
# series, file, item), section headers, and the ordered list of fields with
# their visibility flags. Templates read it at build time via
# `hugo.Data.standards.isadg`. It is structured per language (es / en) so a
# single lookup resolves the (standard, language) pair.
#
# The Spanish strings are kept identical to the matching strings elsewhere
# in the theme — the section headers and field labels in the i18n bundles
# (i18n/es.toml) and the level labels in data/ui.yaml — so the same wording
# renders no matter which surface a record passes through. The English
# strings likewise mirror the English i18n bundle. Field order reproduces
# the exact rendering order of the description template.
#
# To override for a deployment, copy this entire file to
# instance/themes/{name}/data/standards/isadg.yaml and edit it. Hugo
# replaces whole top-level keys across the theme chain, so a partial
# override would silently drop the sibling language block — always ship the
# full file.

