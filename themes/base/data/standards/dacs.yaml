# DACS descriptive standard profile
#
# DACS (Describing Archives: A Content Standard) is the North American
# archival description standard. This file is the DACS profile: the field
# labels, level labels (fonds, series, file, item), section headers, and
# the ordered list of fields with their visibility flags. Templates read it
# at build time to render archival records under the DACS standard.
#
# The profile structure mirrors isadg.yaml — the same top-level schema and
# the same field keys — so a single template loop renders any standard. The
# DACS-specific labels and the `show: false` flags reflect the DACS 2019
# element set, with the English labels checked against the published
# standard at https://saa-ts-dacs.github.io/.
#
# The Spanish profile is a placeholder. Each Spanish label is copied from
# the ISAD(G) profile and marked `[STUB]`; a qualified archivist must supply
# vetted Colombian Spanish DACS terminology before these labels are used in
# production.
#
# To override for a deployment, copy this entire file to
# instance/themes/{name}/data/standards/dacs.yaml and edit it. Hugo replaces
# whole top-level keys across the theme chain, so a partial override would
# silently drop the sibling language block — always ship the full file.

en:
  sections:
    description:   "Description"
    bibliographic: "Bibliographic information"
    access:        "Conditions of Access and Use"
    related:       "Related Materials"
    notes:         "Notes"
    control:       "Control"
    reuse:         "Reuse"
  levels:
    fonds:      "Fonds"
    subfonds:   "Subfonds"
    series:     "Series"
    subseries:  "Subseries"
    file:       "File"
    item:       "Item"
    collection: "Collection"
    section:    "Section"
    volume:     "Volume"
  levelsPlural:
    fonds:      "fonds"
    subfonds:   "subfonds"
    series:     "series"
    subseries:  "subseries"
    file:       "files"
    item:       "items"
    collection: "collections"
    section:    "sections"
    volume:     "volumes"
    caja:       "boxes"
    carpeta:    "folders"
    legajo:     "bundles"
    tomo:       "volumes"
  fields:
    - key: repository
      label: "Name and Location of Repository"
      section: description
      render: special
      show: true
      required: false
    - key: date_formatted
      label: "Date"
      section: description
      render: plain
      show: true
      required: false
    - key: reference_code
      label: "Reference Code"
      section: description
      render: mono
      show: true
      required: true
    - key: scope_content
      label: "Scope and Content"
      section: description
      render: pipelist
      show: true
      required: false
    - key: extent
      label: "Extent"
      section: description
      render: pipelist
      show: true
      required: false
    - key: arrangement
      label: "System of Arrangement"
      section: description
      render: plain
      show: true
      required: false
    - key: publication_title
      label: "Publication"
      section: bibliographic
      render: plain
      show: false
    - key: series_statement
      label: "Series"
      section: bibliographic
      render: plain
      show: false
    - key: uniform_title
      label: "Uniform title"
      section: bibliographic
      render: plain
      show: false
    - key: section_title
      label: "Section"
      section: bibliographic
      render: plain
      show: false
    - key: edition_statement
      label: "Edition"
      section: bibliographic
      render: plain
      show: false
    - key: imprint
      label: "Publication Note"
      section: bibliographic
      render: plain
      show: true
      required: false
    - key: pages
      label: "Pages"
      section: bibliographic
      render: plain
      show: false
    - key: access_conditions
      label: "Conditions Governing Access"
      section: access
      render: plain
      show: true
      required: false
    - key: reproduction_conditions
      label: "Conditions Governing Reproduction and Use"
      section: access
      render: special
      show: true
      required: false
    - key: language
      label: "Languages and Scripts of the Material"
      section: access
      render: plain
      show: true
      required: false
    - key: location_of_originals
      label: "Existence and Location of Originals"
      section: related
      render: plain
      show: true
      required: false
    - key: location_of_copies
      label: "Existence and Location of Copies"
      section: related
      render: plain
      show: true
      required: false
    - key: related_materials
      label: "Related Archival Materials"
      section: related
      render: plain
      show: true
      required: false
    - key: notes
      label: "Notes"
      section: notes
      render: pipelist
      show: true
      required: false
    - key: finding_aids
      label: "Finding Aids"
      section: notes
      render: plain
      show: true
      required: false

