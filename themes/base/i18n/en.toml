# Chrome strings — idiomatic US English
#
# This file holds the English interface text Hugo reads at render time:
# navigation, search and facet copy, record sections, the entity and place
# explorers, repository labels, footer copy, and the small shared chrome
# strings. It is the English counterpart of es.toml, and its key structure
# matches that file exactly so every key resolves in both languages.
#
# Unlike es.toml — whose values are frozen to preserve byte-for-byte output —
# this bundle uses grammatically correct English plural forms rather than the
# Spanish bundle's always-plural phrasing. The {{ . }} context-argument
# tokens and the {year}/{date} literal tokens keep the same positions as
# es.toml so the same template code feeds both languages.
#
# Copy discipline: idiomatic US English, no contractions. Agentless passive
# is acceptable for institutional statements where the actor is irrelevant.
#
# Version: v0.6.0

