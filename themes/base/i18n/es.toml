# Chrome strings — Colombian Spanish
#
# This file holds the Spanish interface text Hugo reads at render time:
# navigation, search and facet copy, record sections, the entity and place
# explorers, repository labels, footer copy, and the small shared chrome
# strings. It is the original bundle; en.toml mirrors its key structure.
#
# These values are frozen to reproduce the live site's rendered output
# byte-for-byte. Do not correct grammar or spelling here — any grammatically
# imperfect phrasing (for example, always-plural labels) is intentional and
# must stay as is. Idiomatic corrections belong in en.toml.
#
# Wording follows Colombian Spanish, tú-form, with §8.11 archival
# terminology. Controlled-vocabulary keys (levels, levelsPlural, roles,
# entity types, place types) are not in this bundle — they live in the data
# files under data/.
#
# Version: v1.1.0

